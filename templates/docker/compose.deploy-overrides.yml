# Deployment-specific compose overrides.
#
# This is a TEMPLATE — copy it to devops/compose.deploy-overrides.yml and edit.
# The copy is gitignored (devops/**) and never committed.
#
# PURPOSE: publish extra host ports or override services for a single deployment.
# All values are written directly (no templating).
#
# WHAT TO CHANGE MANUALLY:
#   - ports: add any extra ports your deployment needs (e.g. Vite on 8080)
#
# WHEN TO USE:
#   - Extra published ports (e.g. Vite dev server on port 8080)
#   - Per-deployment service overrides
#
# WHEN NOT TO USE:
#   - Traefik entrypoints → edit devops/traefik-static.yml
#   - Traefik routes → edit devops/traefik/bench-XX.yml (hot-reloaded)
#   - Changes for ALL deployments → edit templates/docker/compose.*.yml
#
# COMPOSE COMMAND (add as the last -f flag):
#   docker compose \
#     --project-name dev-bench \
#     -f non.prod.compose.yml \
#     -f frappe_docker/overrides/compose.mariadb.yaml \
#     -f frappe_docker/overrides/compose.redis.yaml \
#     -f templates/docker/compose.non-prod-https.yaml \
#     -f templates/docker/compose.uid-gid.yml \
#     -f templates/docker/compose.dev.yml \
#     -f devops/compose.deploy-overrides.yml \
#     config > devops/docker/dev-ssl.docker-compose.yml
#
# COMPOSE MERGE RULES:
#   - command:  REPLACED (must include full list if overriding)
#   - ports:    APPENDED (only additions needed)
#   - volumes:  APPENDED
#
# services:
#   proxy:
#     ports:
#       - "8080:8080"
