# Remote non-prod dev over HTTPS, terminated by Traefik.
#
# ROUTING MODEL: every bench (bench 0, 1, 2, ...) is routed through Traefik's FILE
# provider, loading dynamic config from `devops/traefik/*.yml`. This means no Docker labels, no
# `/var/run/docker.sock` mount, no `--providers.docker` flag. Traefik never touches the Docker
# socket at all — a meaningful reduction in attack surface for an internet-facing proxy.
#
# The `frappe` service publishes NO host ports here — Traefik reaches it over the shared docker
# network by container name (`http://frappe:<port>`). Only the proxy binds host 80/443.
# Do NOT combine this file with templates/docker/compose.local-ports.yml.
#
# REQUIRED SETUP STEPS (do once per checkout, before `up`):
#   1. cp templates/traefik/example.static.yml devops/traefik-static.yml
#   2. cp templates/traefik/example.bench.yml devops/traefik/bench-00.yml
# Then edit both files to match your deployment. See docs/traefik-ssl.md for details.
#
# HOW IT WORKS:
#   Traefik loads its static config from a YAML file (--configFile) instead of CLI flags.
#   The static config (entrypoints, providers, certificates) lives in devops/traefik-static.yml.
#   Dynamic config (routers, services) lives in devops/traefik/bench-XX.yml and is hot-reloaded.
#   Adding/removing entrypoints only changes the static YAML — no compose re-render needed.
#
# CERTIFICATES: ACME resolver is production-ready (real Let's Encrypt certs on a server
# with public IP + real DNS). Without public IP, Traefik serves self-signed certs (browser warning).
# Set ACME_CA_SERVER to staging while testing to avoid burning rate limits.
services:
  proxy:
    image: traefik:v3.6
    restart: unless-stopped
    command: ["--configFile=/etc/traefik/static.yml"]
    ports:
      - ${HTTP_PUBLISH_PORT:-80}:80
      - ${HTTPS_PUBLISH_PORT:-443}:443
    volumes:
      - cert-data:/letsencrypt
      # Static config: entrypoints, providers, certificates. Restart required to reload.
      - ${PWD}/devops/traefik-static.yml:/etc/traefik/static.yml:ro
      # Dynamic config: bench routes (bench-00.yml, bench-01.yml, etc.). Hot-reloaded.
      - ${PWD}/devops/traefik:/etc/traefik/dynamic:ro

volumes:
  cert-data:
