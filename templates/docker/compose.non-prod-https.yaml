# Remote non-prod dev over HTTPS, terminated by Traefik.
#
# ROUTING MODEL: every bench (bench 0, 1, 2, ...) is routed through Traefik's FILE
# provider, loading dynamic config from `devops/traefik/*.yml`. This means no Docker labels, no
# `/var/run/docker.sock` mount, no `--providers.docker` flag. Traefik never touches the Docker
# socket at all — a meaningful reduction in attack surface for an internet-facing proxy.
#
# The `frappe` service publishes NO host ports here — Traefik reaches it over the shared docker
# network by container name (`http://frappe:<port>`). Only the proxy binds host 80/443.
# Do NOT combine this file with templates/docker/compose.local-ports.yml.
#
# REQUIRED SETUP STEP (do this once per checkout, before `up`):
#   cp templates/traefik/example.bench.yml devops/traefik/bench-00.yml
# Then edit the file to set your hostname and bench ports. This is the exact same pattern as `.env`
# and `example.env` — a template you copy and customize for your deployment. Every bench (bench 0,
# 1, 2, ...) uses the same template; bench 0 is just copied with a `bench-00` name for sorting.
#
# Multi-site (one bench, many domains): a bench's router rule can list multiple hostnames, e.g.
#   rule: "Host(`a.example.com`) || Host(`b.example.com`)"
# Frappe resolves the site from the Host header, so all sites share one port — no per-site config.
#
# Multi-BENCH (several benches, each on its own port + domain): add one file per extra bench under
# `devops/traefik/` from the `templates/traefik/example.bench.yml` template following the bench-XX.yml naming
# convention (bench-00.yml, bench-01.yml, bench-02.yml, ...). See docs/traefik-ssl.md. Each bench is
# its own router+service pair mapping domain → http://frappe:<port>. A port RANGE would NOT work
# here: Traefik routes by Host/path rule and load-balances a service's servers, so a range would
# spray each site's traffic across every bench instead of picking the right one.
#
# Certificates: the ACME resolver below is production-ready (real Let's Encrypt certs on a server
# that has a public IP + real DNS for your hostname). On a workstation with no public IP / real
# domain, HTTP-01 validation can't complete, so Traefik just serves its built-in self-signed cert —
# the stack still comes up and is reachable over https:// (with a browser warning). Point
# ACME_CA_SERVER at the Let's Encrypt staging directory while testing to avoid burning rate limits.
services:
  proxy:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      # File provider: every router/service (bench 0, 1, 2, ...) is declared in these files.
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      # Global HTTP -> HTTPS redirect (the ACME HTTP-01 challenge is still served before this).
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.main-resolver.acme.httpchallenge=true
      - --certificatesresolvers.main-resolver.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.main-resolver.acme.email=${LETSENCRYPT_EMAIL:?No Let's Encrypt email set}
      - --certificatesresolvers.main-resolver.acme.storage=/letsencrypt/acme.json
      # Defaults to Let's Encrypt production; override with the staging directory while testing.
      - --certificatesresolvers.main-resolver.acme.caserver=${ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
    ports:
      - ${HTTP_PUBLISH_PORT:-80}:80
      - ${HTTPS_PUBLISH_PORT:-443}:443
    volumes:
      - cert-data:/letsencrypt
      # Dynamic config: all benches (bench-00.yml, bench-01.yml, etc.). Read-only; Traefik only needs to read these.
      # See templates/traefik/example.bench.yml (template for all benches following bench-XX.yml convention).
      - ${PWD}/devops/traefik:/etc/traefik/dynamic:ro

volumes:
  cert-data:
