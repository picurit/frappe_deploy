# Traefik static configuration template.
#
# This file defines HOW Traefik starts: which ports to listen on, where to find
# dynamic config (routers/services), and how to obtain TLS certificates.
#
# This is a TEMPLATE — copy it to devops/traefik/traefik-static.yml and edit
# the placeholder values to match your deployment. The copy is gitignored (devops/**)
# and never committed.
#
# HOW IT WORKS:
#   This file functions like a .env file — plain YAML values, no templating.
#   Edit the email, caServer, and entrypoints directly. No variable substitution.
#
# SETUP:
#   1. cp templates/traefik/example.static.yml devops/traefik/traefik-static.yml
#   2. Edit devops/traefik/traefik-static.yml (see placeholders below)
#   3. The compose file mounts it via:
#      command: ["--configFile=/etc/traefik/static.yml"]
#
# TWO-LAYER ARCHITECTURE:
#   Layer 1 — Static (this file):
#     Loaded once at startup via --configFile. Defines entrypoints, providers,
#     certificate resolvers. Changes require a container restart.
#   Layer 2 — Dynamic (bench-XX.yml, extra-services-XX.yml):
#     Hot-reloaded from /etc/traefik/dynamic/. Defines routers, services.
#     Changes are picked up automatically (no restart).
#
# WHAT TO CHANGE MANUALLY:
#   - email:            your Let's Encrypt email
#   - caServer:         production or staging ACME URL
#   - vite entrypoint:  uncomment to enable Vite dev server on port 8080
#   Everything else can stay as-is for a standard deployment.

# Entrypoints: which ports Traefik listens on.
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
  # Vite dev server — uncomment to enable.
  # The Vite dev server uses port 8080 with a protocol-relative script tag,
  # so the browser requests https://<site>:8080/@vite/client directly.
  # vite:
  #   address: ":8080"

# Providers: where Traefik finds dynamic configuration (routers, services).
providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Certificate resolver: Let's Encrypt via ACME HTTP-01 challenge.
certificatesResolvers:
  main-resolver:
    acme:
      httpChallenge:
        entryPoint: web
      email: you@example.com
      storage: /letsencrypt/acme.json
      # Use staging while testing to avoid burning rate limits:
      # caServer:
      # https://acme-staging-v02.api.letsencrypt.org/directory
      # production:
      # https://acme-v02.api.letsencrypt.org/directory
      caServer: https://acme-staging-v02.api.letsencrypt.org/directory

